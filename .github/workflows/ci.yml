name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Configure npm auth for GitHub Packages
        run: |
          cat > ~/.npmrc <<EOF
          registry=https://npm.pkg.github.com/
          _auth="${GITHUB_TOKEN}"
          email=${PUBLISH_EMAIL}
          always-auth=true
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_EMAIL: ${{ secrets.PUBLISH_EMAIL }}
      
      - name: Run npm login
        run: 'npm login --registry=https://npm.pkg.github.com/ -e=${PUBLISH_EMAIL} --always-auth=true'

      - name: Install dependencies
        run: 'npm ci'

      - name: Run lint
        run: 'npm run lint'

      - name: Build
        run: 'npm run build'

      - name: Run release
        run: 'npm run release'

      # Staging publish: patch constants to staging, publish main version
      - name: Publish staging to GitHub Packages
        if: ${{ github.ref_type != 'tag' }}
        run: |
          node scripts/patch-env.js staging
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Sandbox-dev publish: patch constants to sandbox, publish as -dev prerelease
      - name: Publish sandbox-dev to GitHub Packages
        if: ${{ github.ref_type != 'tag' }}
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          npm version "${BASE_VERSION}-dev" --no-git-tag-version --allow-same-version
          node scripts/patch-env.js sandbox
          npm publish --tag dev
          npm version "$BASE_VERSION" --no-git-tag-version --allow-same-version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm on tag
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Configure npm auth for npm registry
        run: |
          cat > ~/.npmrc <<EOF
          registry=https://registry.npmjs.com/
          _auth="${NPM_TOKEN}"
          email=${PUBLISH_EMAIL}
          always-auth=true
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_EMAIL: ${{ secrets.PUBLISH_EMAIL }}
      - name: Install dependencies
        run: 'npm ci'
      - name: Run lint
        run: 'npm run lint'
      
      - name: Run release
        run: 'npm run release'

      # Staging publish: build, patch to staging, publish main version
      - name: Publish staging to npm
        run: |
          npm run build
          node scripts/patch-env.js staging
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Sandbox-dev publish: patch to sandbox, publish as -dev prerelease
      - name: Publish sandbox-dev to npm
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          npm version "${BASE_VERSION}-dev" --no-git-tag-version --allow-same-version
          node scripts/patch-env.js sandbox
          npm publish --tag dev
          npm version "$BASE_VERSION" --no-git-tag-version --allow-same-version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
