name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build & GitHub Packages publish
    if: ${{ github.ref_type != 'tag' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Configure npm auth for GitHub Packages
        run: |
          cat > ~/.npmrc <<EOF
          registry=https://npm.pkg.github.com/
          _auth="${GITHUB_TOKEN}"
          email=${PUBLISH_EMAIL}
          always-auth=true
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_EMAIL: ${{ secrets.PUBLISH_EMAIL }}

      - name: Install dependencies
        run: 'npm ci'

      - name: Lint
        run: 'npm run lint'

      - name: Build all packages
        run: 'npm run build'

      # Internal staging publish to GitHub Packages.
      - name: Publish staging to GitHub Packages
        run: |
          node scripts/patch-env.js staging
          npm publish --workspaces --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Internal sandbox-dev publish to GitHub Packages.
      - name: Publish sandbox-dev to GitHub Packages
        run: |
          BASE_VERSION=$(node -p "require('./packages/trigger/package.json').version")
          npm version "${BASE_VERSION}-dev" --workspaces --no-git-tag-version --allow-same-version
          npm run build
          node scripts/patch-env.js sandbox
          npm publish --workspaces --access public --tag dev
          npm version "$BASE_VERSION" --workspaces --no-git-tag-version --allow-same-version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish all packages to npm on tag
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Published 5 packages to npm:

            - [`n8n-nodes-agent-brains-trigger@${{ github.ref_name }}`](https://www.npmjs.com/package/n8n-nodes-agent-brains-trigger/v/${{ github.ref_name }})
            - [`n8n-nodes-agent-brains-employee@${{ github.ref_name }}`](https://www.npmjs.com/package/n8n-nodes-agent-brains-employee/v/${{ github.ref_name }})
            - [`n8n-nodes-agent-brains-knowledge-base@${{ github.ref_name }}`](https://www.npmjs.com/package/n8n-nodes-agent-brains-knowledge-base/v/${{ github.ref_name }})
            - [`n8n-nodes-agent-brains-rag@${{ github.ref_name }}`](https://www.npmjs.com/package/n8n-nodes-agent-brains-rag/v/${{ github.ref_name }})
            - [`n8n-nodes-agent-brains-synthetic-qa@${{ github.ref_name }}`](https://www.npmjs.com/package/n8n-nodes-agent-brains-synthetic-qa/v/${{ github.ref_name }})