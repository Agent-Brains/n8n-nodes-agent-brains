name: CI

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    name: Build & GitHub Packages publish
    if: ${{ github.ref_type != 'tag' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Configure npm auth for GitHub Packages
        run: |
          cat > ~/.npmrc <<EOF
          registry=https://npm.pkg.github.com/
          _auth="${GITHUB_TOKEN}"
          email=${PUBLISH_EMAIL}
          always-auth=true
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_EMAIL: ${{ secrets.PUBLISH_EMAIL }}

      - name: Install dependencies
        run: 'npm ci'

      - name: Lint
        run: 'npm run lint'

      - name: Build all packages
        run: 'npm run build'

      # Internal staging publish to GitHub Packages.
      - name: Publish staging to GitHub Packages
        run: |
          node scripts/patch-env.js staging
          npm publish --workspaces --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Internal sandbox-dev publish to GitHub Packages.
      - name: Publish sandbox-dev to GitHub Packages
        run: |
          BASE_VERSION=$(node -p "require('./packages/trigger/package.json').version")
          npm version "${BASE_VERSION}-dev" --workspaces --no-git-tag-version --allow-same-version
          npm run build
          node scripts/patch-env.js sandbox
          npm publish --workspaces --access public --tag dev
          npm version "$BASE_VERSION" --workspaces --no-git-tag-version --allow-same-version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish all packages to npm on tag
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure npm auth for npm registry
        run: |
          cat > ~/.npmrc <<EOF
          registry=https://registry.npmjs.com/
          _auth="${NPM_TOKEN}"
          email=${PUBLISH_EMAIL}
          always-auth=true
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_EMAIL: ${{ secrets.PUBLISH_EMAIL }}

      - name: Install dependencies
        run: 'npm ci'

      - name: Lint
        run: 'npm run lint'

      # Single command: builds every package, publishes staging + sandbox-dev
      # for all 5 workspaces with provenance.
      - name: Release all packages to npm
        run: 'npm run release:all'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PROVENANCE_FLAG: '--provenance'
